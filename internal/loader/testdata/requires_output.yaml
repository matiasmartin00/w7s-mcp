id: requires-output-workflow
name: Requires Output Workflow
version: "1.0.0"
agents:
  - id: explorer
    name: Explorer
  - id: implementor
    name: Implementor
  - id: verifier
    name: Verifier
steps:
  - id: explore
    agent: explorer
    input: "Explore the codebase."
    expects: "STATUS:\\s*done"
  - id: implement
    agent: implementor
    input: "Implement the solution."
    requires_output:
      - explore
    expects: "STATUS:\\s*done"
  - id: verify
    agent: verifier
    input: "Verify the implementation."
    requires_output:
      - explore
      - implement
    expects: "STATUS:\\s*done"
