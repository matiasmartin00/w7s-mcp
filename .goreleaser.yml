version: 2

project_name: w7s-mcp

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: w7s-mcp
    main: ./cmd/w7s-mcp
    binary: w7s-mcp
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: '🚀 Features'
      regexp: '^feat'
      order: 0
    - title: '🐛 Bug Fixes'
      regexp: '^fix'
      order: 1
    - title: '⚡ Performance'
      regexp: '^perf'
      order: 2
    - title: '🔧 Other Changes'
      order: 999

release:
  github:
    owner: matiasmartin00
    name: w7s-mcp
  name_template: 'v{{.Version}}'
  draft: false
  prerelease: auto
  footer: |
    ## Installation

    ### macOS / Linux (curl)
    ```sh
    # Replace VERSION and OS/ARCH with your values (e.g. v0.1.0, macOS_arm64)
    curl -L https://github.com/matiasmartin00/w7s-mcp/releases/download/v{{.Version}}/w7s-mcp_{{.Version}}_macOS_arm64.tar.gz | tar xz
    sudo mv w7s-mcp /usr/local/bin/
    ```

    ### Verify checksum
    ```sh
    sha256sum --check checksums.txt
    ```

    ### MCP client configuration
    ```json
    {
      "mcp": {
        "w7s": {
          "type": "remote",
          "url": "http://localhost:4004/mcp"
        }
      }
    }
    ```

    **Full documentation:** https://matiasmartin00.github.io/w7s-mcp
